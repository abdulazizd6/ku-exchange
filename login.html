<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Korea-Uzbekistan Exchange</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background:var(--c-background)">

  <header id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="assets/images/logo.jpg" alt="Korea-Uzbekistan Exchange Program Logo" class="nav-logo-img">
      </a>
      <a href="index.html" style="font-size:0.85rem;font-weight:600;color:var(--c-muted);letter-spacing:0.05em;text-transform:uppercase">← Back to Site</a>
    </div>
  </header>

  <main style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding-top:var(--nav-h);padding-bottom:var(--space-2xl)">
    <div style="width:100%;max-width:440px;padding:var(--space-md)">
      <div style="text-align:center;margin-bottom:var(--space-lg)">
        <h1 class="display d2">Welcome Back</h1>
        <p style="color:var(--c-muted);margin-top:0.5rem">Sign in to view your application or submit a story.</p>
      </div>

      <div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-lg);padding:var(--space-xl)">
        <form id="login-form" style="display:flex;flex-direction:column;gap:1.25rem">
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" required placeholder="you@school.edu">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.9rem">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0;color:var(--c-text)">
              <input type="checkbox" id="remember" checked style="width:16px;height:16px;accent-color:var(--c-accent-gold)">
              Remember me
            </label>
            <button type="button" id="btn-forgot" style="background:none;border:none;color:var(--c-accent-gold);font-weight:500;cursor:pointer;padding:0;font-family:inherit">Forgot password?</button>
          </div>

          <div id="error-msg" style="color:#d93025;font-size:0.9rem;display:none;margin-top:-0.5rem"></div>
          <div id="success-msg" style="color:#188038;font-size:0.9rem;display:none;margin-top:-0.5rem"></div>

          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem" id="btn-submit">Sign In</button>
        </form>

        <div style="display:flex;align-items:center;margin:1.5rem 0;color:var(--c-muted);font-size:0.85rem">
          <div style="flex:1;height:1px;background:var(--c-border)"></div>
          <span style="padding:0 1rem;text-transform:uppercase;letter-spacing:0.05em">Or continue with</span>
          <div style="flex:1;height:1px;background:var(--c-border)"></div>
        </div>

        <button id="btn-google" class="btn btn-outline btn-lg" style="width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
      </div>

      <p style="text-align:center;margin-top:1.5rem;font-size:0.95rem;color:var(--c-muted)">
        Don't have an account? <a href="signup.html" style="color:var(--c-text);font-weight:600;text-decoration:underline;text-underline-offset:3px">Sign up</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { signInWithEmail, signInWithGoogle, resetPassword } from './js/auth.js';

    const form = document.getElementById('login-form');
    const btnGoogle = document.getElementById('btn-google');
    const btnForgot = document.getElementById('btn-forgot');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const btnSubmit = document.getElementById('btn-submit');
    const emailInput = document.getElementById('email');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      btnSubmit.textContent = 'Signing in...';
      btnSubmit.disabled = true;

      try {
        await signInWithEmail({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          remember: document.getElementById('remember').checked
        });
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
      } finally {
        btnSubmit.textContent = 'Sign In';
        btnSubmit.disabled = false;
      }
    });

    btnGoogle.addEventListener('click', async () => {
      try {
        await signInWithGoogle(document.getElementById('remember').checked);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
      }
    });

    btnForgot.addEventListener('click', async () => {
      const email = emailInput.value;
      if (!email) {
        showError("Please enter your email address first, then click Forgot Password.");
        return;
      }
      try {
        await resetPassword(email);
        errorMsg.style.display = 'none';
        successMsg.textContent = `Password reset email sent to ${email}`;
        successMsg.style.display = 'block';
      } catch (err) {
        showError(err.message);
      }
    });
  </script>
</body>
</html>
